name: iOS Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode 16.4
        run: |
          XCODE_PATH="/Applications/Xcode_16.4.app/Contents/Developer"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Expected Xcode not found at $XCODE_PATH"
            ls -1 /Applications | grep -E '^Xcode'
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift package dependencies
        run: xcodebuild -resolvePackageDependencies -project AtlasScan.xcodeproj

      - name: Build AtlasScanApp
        run: |
          xcodebuild clean build \
            -project AtlasScan.xcodeproj \
            -scheme AtlasScanApp \
            -destination 'generic/platform=iOS' \
            -derivedDataPath BuildArtifacts \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify app artifact exists
        run: test -d BuildArtifacts/Build/Products/Debug-iphoneos/AtlasScanApp.app
