    dependencies:
      - target: AtlasScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.AtlasScanApp
        INFOPLIST_FILE: Sources/AtlasScanApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: AtlasScan
        INFOPLIST_KEY_CFBundleName: AtlasScan
