name: AtlasScan
options:
  bundleIdPrefix: com.martinbibb
packages:
  AtlasContracts:
    path: ../atlas-contact-dae
targets:
  AtlasScan:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/AtlasScan
    dependencies:
      - package: AtlasContracts
        product: AtlasContracts
  AtlasScanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/AtlasScanApp
    dependencies:
      - target: AtlasScan
      - package: AtlasContracts
        product: AtlasContracts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.AtlasScanApp
        INFOPLIST_FILE: Sources/AtlasScanApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: AtlasScan
        INFOPLIST_KEY_CFBundleName: AtlasScan
