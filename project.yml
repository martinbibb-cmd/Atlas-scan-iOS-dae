name: AtlasScan
options:
  bundleIdPrefix: com.martinbibb
  deploymentTarget:
    iOS: "17.0"

packages:
  AtlasScan:
    path: .

targets:
  AtlasScanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/AtlasScanApp
    dependencies:
      - package: AtlasScan
        product: AtlasScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.AtlasScanApp
        INFOPLIST_FILE: Sources/AtlasScanApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Atlas Scan"
        INFOPLIST_KEY_CFBundleName: "AtlasScan"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
